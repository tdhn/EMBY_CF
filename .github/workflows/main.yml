name: 部署到Workflow

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy worker.js --name ${{ secrets.CLOUDFLARE_WORKER_NAME }} --compatibility-date 2026-03-01
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install axios
      
      - name: Create Worker Route and DNS Record
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}
          DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          echo "检查环境变量..."
          echo "API_TOKEN: ${API_TOKEN:0:5}..."
          echo "ACCOUNT_ID: ${ACCOUNT_ID}"
          echo "ZONE_ID: ${ZONE_ID}"
          echo "WORKER_NAME: ${WORKER_NAME}"
          echo "DOMAIN: ${DOMAIN}"
          
          node -e "
          const axios = require('axios');
          const apiToken = process.env.API_TOKEN;
          const accountId = process.env.ACCOUNT_ID;
          const zoneId = process.env.ZONE_ID;
          const workerName = process.env.WORKER_NAME;
          const customDomain = process.env.DOMAIN;
          
          console.log('=== 调试信息 ===');
          console.log('API Token:', apiToken ? '已设置' : '未设置');
          console.log('Account ID:', accountId);
          console.log('Zone ID:', zoneId);
          console.log('Worker Name:', workerName);
          console.log('Custom Domain:', customDomain);
          
          if (!apiToken) {
            console.error('错误: API令牌未设置');
            process.exit(1);
          }
          if (!accountId) {
            console.error('错误: 账户ID未设置');
            process.exit(1);
          }
          if (!zoneId) {
            console.error('错误: 区域ID未设置');
            process.exit(1);
          }
          if (!workerName) {
            console.error('错误: Worker名称未设置');
            process.exit(1);
          }
          if (!customDomain) {
            console.error('错误: 自定义域名未设置');
            process.exit(1);
          }
          
          // 验证区域ID格式
          if (zoneId.length !== 32 || !/^[a-f0-9]+$/i.test(zoneId)) {
            console.error('错误: 区域ID格式不正确');
            console.error('提示: 区域ID应该是32位的字母数字字符串，不是域名');
            console.error('如何获取区域ID: 在Cloudflare仪表板中，进入域名管理页面，右侧栏有区域ID');
            process.exit(1);
          }
          
          const headers = {
            'Authorization': 'Bearer ' + apiToken,
            'Content-Type': 'application/json'
          };
          
          console.log('=== 开始创建操作 ===');
          
          // 1. 创建Worker路由
          async function createWorkerRoute() {
            try {
              console.log('=== 开始创建Worker路由 ===');
              console.log('自定义域名:', customDomain);
              console.log('Worker名称:', workerName);
              console.log('账户ID:', accountId);
              
              // 检查Worker是否存在
              const workerCheckUrl = 'https://api.cloudflare.com/client/v4/accounts/' + accountId + '/workers/scripts/' + workerName;
              console.log('检查Worker URL:', workerCheckUrl);
              
              const workerCheckResponse = await axios.get(workerCheckUrl, { headers });
              console.log('Worker检查响应:', JSON.stringify(workerCheckResponse.data, null, 2));
              
              // 创建路由
              const routeUrl = 'https://api.cloudflare.com/client/v4/accounts/' + accountId + '/workers/routes';
              console.log('创建路由URL:', routeUrl);
              
              const routeData = {
                pattern: customDomain + '/*',
                script: workerName
              };
              console.log('路由数据:', JSON.stringify(routeData));
              
              const routeResponse = await axios.post(routeUrl, routeData, { headers });
              console.log('=== Worker路由创建成功 ===');
              console.log('响应:', JSON.stringify(routeResponse.data, null, 2));
            } catch (error) {
              console.error('=== Worker路由创建失败 ===');
              console.error('错误:', error.message);
              if (error.response) {
                console.error('状态码:', error.response.status);
                console.error('响应:', JSON.stringify(error.response.data, null, 2));
              }
              console.error('可能的原因:');
              console.error('1. Worker名称不存在');
              console.error('2. API令牌权限不足');
              console.error('3. 账户ID或区域ID错误');
              console.error('4. 自定义域名格式不正确');
            }
          }
          
          // 2. 创建DNS记录
          async function createDNSRecord() {
            try {
              console.log('正在检查DNS记录...');
              const dnsCheckUrl = 'https://api.cloudflare.com/client/v4/zones/' + zoneId + '/dns_records?type=CNAME&name=' + customDomain;
              console.log('DNS检查URL:', dnsCheckUrl);
              
              const dnsCheckResponse = await axios.get(dnsCheckUrl, { headers });
              console.log('DNS检查响应:', JSON.stringify(dnsCheckResponse.data, null, 2));
              
              if (dnsCheckResponse.data.result && dnsCheckResponse.data.result.length === 0) {
                console.log('正在创建DNS记录...');
                const dnsCreateUrl = 'https://api.cloudflare.com/client/v4/zones/' + zoneId + '/dns_records';
                console.log('DNS创建URL:', dnsCreateUrl);
                
                const dnsData = {
                  type: 'CNAME',
                  name: customDomain,
                  content: 'dirige.cf.cnae.top',
                  ttl: 1,
                  proxied: false
                };
                console.log('DNS数据:', JSON.stringify(dnsData));
                
                const dnsCreateResponse = await axios.post(dnsCreateUrl, dnsData, { headers });
                console.log('DNS记录创建成功:', JSON.stringify(dnsCreateResponse.data, null, 2));
              } else {
                console.log('DNS记录已存在，跳过创建');
              }
            } catch (error) {
              console.error('DNS记录操作失败:');
              console.error('错误:', error.message);
              if (error.response) {
                console.error('状态码:', error.response.status);
                console.error('响应:', JSON.stringify(error.response.data, null, 2));
              }
            }
          }
          
          // 3. 运行创建操作
          (async () => {
            await createWorkerRoute();
            await createDNSRecord();
            console.log('=== 部署流程完成 ===');
          })();
          " 
      
      - name: 检查环境变量配置
        run: |
          echo "请确保在GitHub Secrets中配置了以下变量："
          echo "- CLOUDFLARE_API_TOKEN: Cloudflare API令牌"
          echo "- CLOUDFLARE_ACCOUNT_ID: Cloudflare账户ID"
          echo "- CLOUDFLARE_ZONE_ID: Cloudflare区域ID"
          echo "- CLOUDFLARE_WORKER_NAME: Worker名称"
          echo "- CUSTOM_DOMAIN: 自定义域名"
          echo ""
          echo "如何获取这些值："
          echo "1. Cloudflare API令牌：在Cloudflare仪表板 → 我的个人资料 → API令牌 → 创建自定义令牌"
          echo "2. 账户ID：在Cloudflare仪表板右下角"
          echo "3. 区域ID：在域名管理页面右侧栏，是一个32位的字母数字字符串，不是域名"
          echo "   例如：3b64ad027d577dd839b68afa978442b9"
          echo "4. Worker名称：您想要的Worker名称"
          echo "5. 自定义域名：您想要绑定的域名"
          echo ""
          echo "常见错误："
          echo "- 区域ID不是域名，而是32位的字母数字字符串"
          echo "- API令牌需要有正确的权限（Workers和DNS编辑权限）"
          echo "- 自定义域名必须已添加到Cloudflare"
          echo "- 账户ID和区域ID必须对应正确的账户和域名"
      
      - name: Display deployment instructions
        env:
          DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          echo "部署完成！"
          echo "请确保已完成以下步骤："
          echo "1. 已在Cloudflare中添加自定义域名到您的区域"
          echo "2. 已将域名的NS记录指向Cloudflare"
          echo "3. 已在GitHub Secrets中配置以下变量："
          echo "   - CLOUDFLARE_API_TOKEN: Cloudflare API令牌"
          echo "   - CLOUDFLARE_ACCOUNT_ID: Cloudflare账户ID"
          echo "   - CLOUDFLARE_ZONE_ID: Cloudflare区域ID"
          echo "   - CLOUDFLARE_WORKER_NAME: Worker名称"
          echo "   - CUSTOM_DOMAIN: 自定义域名"
          if [ -n "$DOMAIN" ]; then
            echo ""
            echo "您的Worker现在应该可以通过以下地址访问："
            echo "https://$DOMAIN"
          fi
